name: reliability

# Two gates for the memory core:
#   - fast: the mocked unit suite (quick signal on every push)
#   - reliability: the REAL retrieval stack (PGlite + real schema + real Ollama
#     embeddings) running the behavioral suites + the precision/recall/leak-rate
#     scorecard. This is the gate that catches the mock-vs-reality bugs (scope
#     leaks, off-topic injection, dedup) the unit suite structurally can't.

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx vitest run

  reliability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci

      - name: Install Ollama
        # ollama.com/install.sh flakes / 504s on the runners and blocks the gate.
        # (A naive `curl | sh` also MASKS curl's failure under `bash -e` without
        # pipefail — sh exits 0 on empty input.) So: download the script to a file
        # and check `ollama` actually landed, with retries; if ollama.com is down,
        # fall back to the pinned-latest GitHub release tarball (github.com, which
        # is independent of the ollama.com outage).
        run: |
          set -o pipefail
          install_via_script() {
            for attempt in 1 2 3; do
              if curl -fsSL https://ollama.com/install.sh -o /tmp/ollama-install.sh \
                 && sh /tmp/ollama-install.sh && command -v ollama >/dev/null; then
                return 0
              fi
              echo "install.sh attempt $attempt failed; retrying in 10s..." >&2
              sleep 10
            done
            return 1
          }
          install_via_github() {
            echo "ollama.com unavailable — falling back to the GitHub release binary..." >&2
            # The current Linux asset is ollama-linux-amd64.tar.zst (zstd), NOT a
            # .tgz — the old .tgz URL 302s to a non-existent asset and 404s, which
            # silently sank this fallback. Download the real asset and extract it
            # with zstd. github.com's asset CDN is independent of ollama.com.
            for attempt in 1 2 3; do
              if curl -fsSL https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tar.zst -o /tmp/ollama.tar.zst \
                 && sudo tar -C /usr/local --zstd -xf /tmp/ollama.tar.zst \
                 && command -v ollama >/dev/null; then
                return 0
              fi
              echo "github release attempt $attempt failed; retrying in 10s..." >&2
              sleep 10
            done
            return 1
          }
          install_via_script || install_via_github
          command -v ollama || { echo "ollama unavailable after install.sh + GitHub fallback" >&2; exit 1; }
          ollama --version || true

      - name: Start Ollama + pull embedding model
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          # wait for the API to come up
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break
            sleep 1
          done
          # 1024-dim model — matches Sigil's pinned EMBEDDING_DIM (the harness +
          # production schema are vector(1024)). nomic-embed-text (768) would fail
          # the dimension check. Retry the pull too — the registry can 5xx briefly.
          for attempt in 1 2 3; do
            if ollama pull mxbai-embed-large; then break; fi
            echo "ollama pull attempt $attempt failed; retrying in 10s..." >&2
            sleep 10
          done

      - name: Reliability gate (real embeddings + scorecard)
        run: npm run test:reliability
        env:
          OLLAMA_HOST: http://127.0.0.1:11434
          SIGIL_COMMIT: ${{ github.sha }}

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-scorecard
          path: |
            test/reliability/scorecard.json
            test/reliability/scorecard-history.jsonl
          if-no-files-found: ignore
