name: 'Autoducks: Fix Agent'

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
jobs:
  fix:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/agents fix')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load agent defaults
        id: agent
        run: AUTODUCKS_AGENT=fix bash .autoducks/core/config/load-agent-defaults.sh >> "$GITHUB_OUTPUT"
      - name: Parse directive
        id: directive
        run: source .autoducks/core/config/parse-directive.sh >> "$GITHUB_OUTPUT"
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
      - name: Pre-execution
        run: bash .autoducks/agents/fix/pre.sh
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run LLM agent
        uses: ./.autoducks/providers/llm/claude
        with:
          prompt_file: .autoducks/agents/fix/prompt.md
          allowed_tools: "Read,Write,Edit,Bash,Glob,Grep"
          model: ${{ steps.directive.outputs.model || steps.agent.outputs.model }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - name: Post-execution
        if: always()
        run: bash .autoducks/agents/fix/post.sh
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
