name: 'Autoducks: Revert Agent'

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  revert:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/agents revert')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run revert
        run: bash .autoducks/agents/revert/run.sh
        env:
          FEATURE_ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          RUN_ID: ${{ github.run_id }}
          COMMENTER: ${{ github.event.comment.user.login }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
