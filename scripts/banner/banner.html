<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Sigil banner</title>
<style>
  :root {
    --bg-0: #050b1f;
    --bg-1: #0a1530;
    --node-light: #C9E7FF;
    --node-mid: #0084FF;
    --node-deep: #004CE6;
    --edge: rgba(0, 132, 255, 0.35);
    --edge-strong: rgba(201, 231, 255, 0.55);
    --focus: #C9E7FF;
    --text: #E9F2FF;
    --text-dim: #7FA3D6;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-0);
    width: 1280px; height: 320px;
    overflow: hidden;
    font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
    color: var(--text);
  }
  .stage {
    position: relative;
    width: 1280px; height: 320px;
    background:
      radial-gradient(1100px 600px at 75% 50%, #0a1f4a 0%, var(--bg-1) 45%, var(--bg-0) 100%);
  }
  /* ---------- LEFT TEXT PANEL ---------- */
  .panel {
    position: absolute;
    left: 48px; top: 48px;
    width: 380px;
    opacity: 0;
    animation: fadeUp 0.7s ease-out 0.05s forwards;
  }
  .brand-row { display: flex; align-items: center; gap: 14px; }
  .logo-mark { width: 48px; height: 48px; }
  .title {
    font-size: 44px; font-weight: 700; letter-spacing: -0.02em;
    margin: 0; line-height: 1;
  }
  .tagline {
    margin-top: 12px;
    font-size: 16px; font-weight: 500;
    color: var(--text);
    line-height: 1.35;
  }
  .desc {
    margin-top: 8px;
    font-size: 12.5px; color: var(--text-dim);
    line-height: 1.5;
    max-width: 360px;
  }
  .meta {
    position: absolute;
    left: 48px; bottom: 28px;
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.7;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0.35s forwards;
  }
  .meta b { color: var(--text); font-weight: 600; }

  /* ---------- GRAPH ---------- */
  svg.graph {
    position: absolute;
    inset: 0;
    width: 1280px; height: 320px;
    pointer-events: none;
  }

  /* nodes */
  .node {
    transform-origin: center;
    transform-box: fill-box;
    transform: scale(0);
    animation: pop 0.55s cubic-bezier(.2, 1.5, .4, 1) forwards;
    filter: drop-shadow(0 0 4px rgba(0, 132, 255, 0.55));
  }
  .node.light { fill: var(--node-light); }
  .node.mid   { fill: var(--node-mid); }
  .node.deep  { fill: var(--node-deep); }
  .node.hub {
    filter: drop-shadow(0 0 8px rgba(201, 231, 255, 0.9));
  }

  /* edges */
  .edge {
    stroke: var(--edge);
    stroke-width: 1;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawEdge 0.8s ease-out forwards;
  }
  .edge.bright {
    stroke: var(--edge-strong);
    stroke-width: 1.25;
  }

  /* focus boxes */
  .focus-group { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
  .focus-box {
    fill: none;
    stroke: var(--focus);
    stroke-width: 1.1;
    stroke-dasharray: 3 3;
  }
  .corner {
    fill: none;
    stroke: var(--focus);
    stroke-width: 1.6;
    stroke-linecap: square;
  }
  .focus-label-bg {
    fill: var(--bg-0);
    stroke: var(--focus);
    stroke-width: 0.8;
  }
  .focus-label {
    fill: var(--focus);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9.5px;
    letter-spacing: 0.04em;
  }

  /* ---------- KEYFRAMES ---------- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pop {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes drawEdge {
    to { stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
<div class="stage">

  <!-- Graph layer: behind text -->
  <svg class="graph" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
    <!-- Edges first so they sit behind nodes. Positions are hand-tuned.
         Naming convention: clusterCenter ~ {claude:(620,110), project:(820,90),
         person:(1040,130), playbook:(700,230), vital:(990,225)} -->

    <!-- inter-cluster long edges (light) -->
    <line class="edge bright" x1="620" y1="110" x2="820" y2="90"  style="animation-delay: 2.2s"/>
    <line class="edge bright" x1="820" y1="90"  x2="1040" y2="130" style="animation-delay: 2.3s"/>
    <line class="edge bright" x1="620" y1="110" x2="700" y2="230" style="animation-delay: 2.4s"/>
    <line class="edge bright" x1="820" y1="90"  x2="990" y2="225" style="animation-delay: 2.5s"/>
    <line class="edge bright" x1="700" y1="230" x2="990" y2="225" style="animation-delay: 2.6s"/>
    <line class="edge bright" x1="1040" y1="130" x2="990" y2="225" style="animation-delay: 2.7s"/>

    <line class="edge" x1="620" y1="110" x2="585" y2="80"  style="animation-delay: 1.05s"/>
    <line class="edge" x1="620" y1="110" x2="650" y2="78"  style="animation-delay: 1.1s"/>
    <line class="edge" x1="620" y1="110" x2="572" y2="135" style="animation-delay: 1.15s"/>

    <line class="edge" x1="620" y1="110" x2="600" y2="158" style="animation-delay: 1.4s"/>

    <!-- project cluster edges -->
    <line class="edge" x1="820" y1="90"  x2="790" y2="60"  style="animation-delay: 1.2s"/>
    <line class="edge" x1="820" y1="90"  x2="852" y2="62"  style="animation-delay: 1.25s"/>
    <line class="edge" x1="820" y1="90"  x2="800" y2="125" style="animation-delay: 1.3s"/>
    <line class="edge" x1="820" y1="90"  x2="860" y2="118" style="animation-delay: 1.35s"/>

    <line class="edge" x1="1040" y1="130" x2="1010" y2="160" style="animation-delay: 1.45s"/>
    <line class="edge" x1="1040" y1="130" x2="1080" y2="162" style="animation-delay: 1.5s"/>
    <line class="edge" x1="1010" y1="100" x2="1075" y2="105" style="animation-delay: 1.55s"/>
    <line class="edge" x1="1010" y1="160" x2="1080" y2="162" style="animation-delay: 1.6s"/>

    <!-- playbook cluster edges -->

    <line class="edge" x1="700" y1="230" x2="734" y2="260" style="animation-delay: 1.65s"/>
    <line class="edge" x1="670" y1="205" x2="730" y2="200" style="animation-delay: 1.7s"/>
    <line class="edge" x1="668" y1="258" x2="734" y2="260" style="animation-delay: 1.75s"/>

    <!-- vital cluster edges (largest cluster, importance=5) -->
    <line class="edge" x1="990" y1="225" x2="955" y2="200" style="animation-delay: 1.65s"/>
    <line class="edge" x1="990" y1="225" x2="1025" y2="198" style="animation-delay: 1.7s"/>

    <line class="edge" x1="955" y1="200" x2="1025" y2="198" style="animation-delay: 1.9s"/>

    <line class="edge" x1="985" y1="270" x2="1030" y2="255" style="animation-delay: 2.0s"/>

    <!-- ============ NODES ============ -->
    <!-- claude_session cluster (hub + 7 satellites) -->
    <circle class="node hub light" cx="620" cy="110" r="6"   style="animation-delay: 0.85s"/>
    <circle class="node mid"       cx="585" cy="80"  r="3.5" style="animation-delay: 1.0s"/>
    <circle class="node mid"       cx="650" cy="78"  r="3.5" style="animation-delay: 1.05s"/>
    <circle class="node light"     cx="572" cy="135" r="3"   style="animation-delay: 1.1s"/>
    <circle class="node mid"       cx="665" cy="138" r="3.5" style="animation-delay: 1.15s"/>
    <circle class="node deep"      cx="600" cy="158" r="2.5" style="animation-delay: 1.2s"/>

    <circle class="node deep"      cx="555" cy="105" r="2.5" style="animation-delay: 1.3s"/>

    <!-- project cluster -->
    <circle class="node hub light" cx="820" cy="90"  r="6"   style="animation-delay: 1.0s"/>
    <circle class="node mid"       cx="790" cy="60"  r="3.5" style="animation-delay: 1.15s"/>
    <circle class="node light"     cx="852" cy="62"  r="3.5" style="animation-delay: 1.2s"/>
    <circle class="node mid"       cx="800" cy="125" r="3"   style="animation-delay: 1.25s"/>
    <circle class="node mid"       cx="860" cy="118" r="3.5" style="animation-delay: 1.3s"/>

    <!-- playbook cluster -->
    <circle class="node hub light" cx="700" cy="230" r="5.5" style="animation-delay: 1.3s"/>

    <circle class="node light"     cx="730" cy="200" r="3.5" style="animation-delay: 1.5s"/>
    <circle class="node mid"       cx="668" cy="258" r="3"   style="animation-delay: 1.55s"/>
    <circle class="node mid"       cx="734" cy="260" r="3.5" style="animation-delay: 1.6s"/>
    <circle class="node deep"      cx="708" cy="270" r="2.5" style="animation-delay: 1.65s"/>

    <!-- vital cluster -->
    <circle class="node hub light" cx="990" cy="225" r="7"   style="animation-delay: 1.45s"/>
    <circle class="node mid"       cx="955" cy="200" r="3.5" style="animation-delay: 1.6s"/>
    <circle class="node light"     cx="1025" cy="198" r="4"  style="animation-delay: 1.65s"/>
    <circle class="node mid"       cx="950" cy="252" r="3.5" style="animation-delay: 1.7s"/>
    <circle class="node light"     cx="1030" cy="255" r="3.5" style="animation-delay: 1.75s"/>
    <circle class="node mid"       cx="985" cy="270" r="3"   style="animation-delay: 1.8s"/>
    <circle class="node deep"      cx="1055" cy="225" r="2.5" style="animation-delay: 1.85s"/>

    <!-- Scattered "ambient" memory dots -->
    <circle class="node deep" cx="500" cy="55" r="1.5" style="animation-delay: 0.8s"/>
    <circle class="node deep" cx="520" cy="200" r="1.5" style="animation-delay: 0.9s"/>
    <circle class="node deep" cx="745" cy="40" r="1.5" style="animation-delay: 1.0s"/>

    <circle class="node deep" cx="870" cy="270" r="1.5" style="animation-delay: 1.6s"/>
    <circle class="node deep" cx="780" cy="285" r="1.5" style="animation-delay: 1.7s"/>
    <circle class="node deep" cx="610" cy="280" r="1.5" style="animation-delay: 1.8s"/>
    <circle class="node deep" cx="480" cy="150" r="1.5" style="animation-delay: 1.9s"/>

    <!-- ============ ML FOCUS BOXES ============
         Render order = stagger order. Each group fades in then sits. -->

    <!-- claude_session box -->
    <g class="focus-group" style="animation-delay: 2.6s">
      <rect class="focus-box" x="540" y="55"  width="140" height="120" rx="2"/>

    </g>

    <!-- project box -->

    <!-- person box -->

    </g>

    <!-- playbook box -->
    <g class="focus-group" style="animation-delay: 3.35s">
      <rect class="focus-box" x="645" y="185" width="115" height="98" rx="2"/>
      <polyline class="corner" points="645,198 645,185 658,185"/>
      <polyline class="corner" points="760,185 760,198"/>

      <rect class="focus-box" x="930" y="180" width="140" height="115" rx="2"/>
      <polyline class="corner" points="930,193 930,180 943,180"/>
      <polyline class="corner" points="1070,180 1070,193"/>
      <polyline class="corner" points="930,295 930,282"/>
      <polyline class="corner" points="1057,295 1070,295 1070,282"/>

  </svg>

  <!-- LEFT TEXT PANEL (above graph) -->
  <div class="panel">
    <div class="brand-row">
      <!-- Inline logo, scaled -->
      <svg class="logo-mark" viewBox="0 0 100 100">
        <defs>

      <h1 class="title">Sigil</h1>
    </div>
    <div class="tagline">One brain. Every agent. Your machine.</div>
    <div class="desc">Local-first memory shared across Claude Code, Codex CLI, Cursor, Kiro &mdash; any agent that speaks shell or MCP.</div>
  </div>

  <div class="meta">
    <div><b>@Anmol-Srv</b></div>
    <div>npm: <b>@anmol-srv/sigil</b></div>
    <div>github.com/Anmol-Srv/sigil</div>
  </div>

</div>
</body>
</html>
