<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Sigil banner — graph only</title>
<style>
  :root {
    --bg-0: #050b1f;
    --bg-1: #0a1530;
    --node-light: #C9E7FF;
    --node-mid: #0084FF;
    --node-deep: #004CE6;
    --edge: rgba(0, 132, 255, 0.32);
    --edge-bright: rgba(201, 231, 255, 0.55);
    --focus: #C9E7FF;
  }
  html, body { margin: 0; padding: 0; background: var(--bg-0); width: 1280px; height: 320px; overflow: hidden; }
  .stage {
    position: relative;
    width: 1280px; height: 320px;
    background:
      radial-gradient(900px 500px at 30% 50%, #0a1f4a 0%, var(--bg-1) 50%, var(--bg-0) 100%),
      radial-gradient(900px 500px at 80% 50%, #0a1f4a 0%, transparent 60%);
  }
  /* faint grid overlay */
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0, 132, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 132, 255, 0.05) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  svg.graph { position: absolute; inset: 0; width: 1280px; height: 320px; }

  /* ---------- NODES ---------- */
  .node {
    transform-origin: center;
    transform-box: fill-box;
    filter: drop-shadow(0 0 3px rgba(0, 132, 255, 0.6));
  }
  .node.light { fill: var(--node-light); }
  .node.mid   { fill: var(--node-mid); }
  .node.deep  { fill: var(--node-deep); }
  .node.hub {
    filter: drop-shadow(0 0 10px rgba(201, 231, 255, 0.95));
    animation: hubPulse 3s ease-in-out infinite;
  }
  /* phase offsets so 7 hubs don't pulse in lockstep */
  .hub.h1 { animation-delay: 0s;    }
  .hub.h2 { animation-delay: -0.4s; }
  .hub.h3 { animation-delay: -0.8s; }
  .hub.h4 { animation-delay: -1.2s; }
  .hub.h5 { animation-delay: -1.6s; }
  .hub.h6 { animation-delay: -2.0s; }
  .hub.h7 { animation-delay: -2.4s; }

  /* subtle pulse on satellite nodes too */
  .node.sat { animation: satShimmer 4s ease-in-out infinite; }
  .sat.s0 { animation-delay: 0s; }
  .sat.s1 { animation-delay: -0.5s; }
  .sat.s2 { animation-delay: -1.0s; }
  .sat.s3 { animation-delay: -1.5s; }
  .sat.s4 { animation-delay: -2.0s; }
  .sat.s5 { animation-delay: -2.5s; }
  .sat.s6 { animation-delay: -3.0s; }
  .sat.s7 { animation-delay: -3.5s; }

  /* ---------- EDGES ---------- */
  .edge {
    stroke: var(--edge);
    stroke-width: 1;
    fill: none;
    pathLength: 1;
    stroke-dasharray: 1;
    animation: edgeShimmer 4s ease-in-out infinite;
  }
  .edge.bright {
    stroke: var(--edge-bright);
    stroke-width: 1.4;
    animation-name: edgeShimmerBright;
  }
  /* edge phase variants */
  .edge.e0 { animation-delay: 0s; }
  .edge.e1 { animation-delay: -0.3s; }
  .edge.e2 { animation-delay: -0.6s; }
  .edge.e3 { animation-delay: -0.9s; }
  .edge.e4 { animation-delay: -1.2s; }
  .edge.e5 { animation-delay: -1.5s; }
  .edge.e6 { animation-delay: -1.8s; }
  .edge.e7 { animation-delay: -2.1s; }
  .edge.e8 { animation-delay: -2.4s; }
  .edge.e9 { animation-delay: -2.7s; }

  /* ---------- FOCUS BOXES ----------
     Loop duration 6s. Each box appears in a 1.6s window
     aligned with where the scanning sweep crosses its cluster. */
  .focus-group { opacity: 0; animation: focusPulse 6s ease-in-out infinite; }
  .focus-group.f1 { animation-delay: 0.0s; }
  .focus-group.f2 { animation-delay: 0.7s; }
  .focus-group.f3 { animation-delay: 1.4s; }
  .focus-group.f4 { animation-delay: 2.1s; }
  .focus-group.f5 { animation-delay: 2.8s; }
  .focus-group.f6 { animation-delay: 3.5s; }
  .focus-group.f7 { animation-delay: 4.2s; }

  .focus-box {
    fill: none; stroke: var(--focus); stroke-width: 1.1;
    stroke-dasharray: 3 3;
  }
  .corner { fill: none; stroke: var(--focus); stroke-width: 1.6; stroke-linecap: square; }
  .focus-label-bg { fill: var(--bg-0); stroke: var(--focus); stroke-width: 0.8; }
  .focus-label {
    fill: var(--focus);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9.5px; letter-spacing: 0.04em;
  }

  /* ---------- SCANNING SWEEP ----------
     A vertical gradient column slides across the canvas.
     6s loop, starts off-screen left, ends off-screen right, then teleports back. */
  .sweep {
    position: absolute; top: 0; bottom: 0; width: 80px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(201, 231, 255, 0.06) 30%,
      rgba(201, 231, 255, 0.18) 50%,
      rgba(201, 231, 255, 0.06) 70%,
      transparent 100%);
    pointer-events: none;
    animation: sweep 6s linear infinite;
  }

  /* ---------- KEYFRAMES ---------- */
  @keyframes hubPulse {
    0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 6px  rgba(201, 231, 255, 0.7)); }
    50%      { transform: scale(1.18); filter: drop-shadow(0 0 14px rgba(201, 231, 255, 1.0)); }
  }
  @keyframes satShimmer {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 1.0; }
  }
  @keyframes edgeShimmer {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.85; }
  }
  @keyframes edgeShimmerBright {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1.0; }
  }
  @keyframes focusPulse {
    0%   { opacity: 0; }
    8%   { opacity: 1; }
    25%  { opacity: 1; }
    33%  { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes sweep {
    from { transform: translateX(-120px); }
    to   { transform: translateX(1320px); }
  }
</style>
</head>
