<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sigil docs have moved</title>
    <!--
      The Sigil docs moved off this GitHub Pages project page and into the
      dedicated web project (sigil-web), served from Cloudflare Pages.
      Old:  https://anmol-srv.github.io/sigil/<path>
      New:  https://sigil-web.pages.dev/docs/<path>
      This page (and 404.html, which is identical) redirects deep links,
      mapping /sigil/<rest> -> /docs/<rest>.
    -->
    <script>
      (function () {
        var NEW_ORIGIN = 'https://sigil-web.pages.dev';
        var rest = location.pathname.replace(/^\/sigil\/?/, '');
        location.replace(NEW_ORIGIN + '/docs/' + rest + location.search + location.hash);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=https://sigil-web.pages.dev/docs/" />
    <link rel="canonical" href="https://sigil-web.pages.dev/docs/" />
    <style>
      body {
        background: #08090b;
        color: #a2a5ab;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
      }
      a { color: #0084ff; }
    </style>
  </head>
  <body>
    <p>
      The Sigil docs have moved to
      <a href="https://sigil-web.pages.dev/docs/">sigil-web.pages.dev/docs</a>.<br />
      Redirecting you now…
    </p>
  </body>
</html>
