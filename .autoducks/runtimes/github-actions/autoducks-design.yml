name: 'Autoducks: Design Agent'

on:
  issue_comment:
    types: [created]
  issues:
    types: [assigned]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
jobs:
  design:
    if: >-
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       startsWith(github.event.comment.body, '/agents design')) ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'Draft'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load agent defaults
        id: agent
        run: AUTODUCKS_AGENT=design bash .autoducks/core/config/load-agent-defaults.sh >> "$GITHUB_OUTPUT"
      - name: Parse directive
        id: directive
        if: github.event_name == 'issue_comment'
        run: |
          source .autoducks/core/config/parse-directive.sh >> "$GITHUB_OUTPUT"
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
      - name: Pre-execution
        run: bash .autoducks/agents/design/pre.sh
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id || '0' }}
          RUN_ID: ${{ github.run_id }}
          COMMENTER: ${{ github.event.comment.user.login || github.event.sender.login }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run LLM agent
        uses: ./.autoducks/providers/llm/claude
        with:
          prompt_file: .autoducks/agents/design/prompt.md
          allowed_tools: "Read,Write,Edit,Bash(read-only)"
          model: ${{ steps.directive.outputs.model || steps.agent.outputs.model }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - name: Post-execution
        if: always()
        run: bash .autoducks/agents/design/post.sh
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id || '0' }}
          RUN_ID: ${{ github.run_id }}
          COMMENTER: ${{ github.event.comment.user.login || github.event.sender.login }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
