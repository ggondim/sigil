name: 'Autoducks: Close Agent'

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  close:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/agents close')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run close
        run: bash .autoducks/agents/close/run.sh
        env:
          FEATURE_ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          RUN_ID: ${{ github.run_id }}
          COMMENTER: ${{ github.event.comment.user.login }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
